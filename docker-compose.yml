services:
  telegram-summary-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-summary-bot:latest
    container_name: telegram-summary-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/messages.db
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:
